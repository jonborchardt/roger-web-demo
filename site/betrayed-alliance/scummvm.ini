# Shipped scummvm.ini for the Roger web demo bundle (Betrayed Alliance).
# Copied to build-emscripten/scummvm.ini at assembly time. The emscripten
# runtime persists this into IndexedDB on first boot - changing it later
# requires clearing IndexedDB (see docs/roger/WEB_DEMO.md).
[scummvm]
roger_no_launcher=true
roger_gen_mode=cache
confirm_exit=false
gui_return_to_launcher_at_exit=false

[betrayed]
description=Betrayed Alliance Book 1 (Roger web demo)
gameid=sci-fanmade
engineid=sci
path=/gamedata/games/sci-fanmade
